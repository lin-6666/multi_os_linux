name: Lint and Format Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          pip install flake8 black isort mypy

      - name: Check Python formatting (Black)
        continue-on-error: true
        run: |
          if ls *.py 2>/dev/null; then
            black --check . || echo "::warning::Python files need formatting"
          fi

      - name: Check imports (isort)
        continue-on-error: true
        run: |
          if ls *.py 2>/dev/null; then
            isort --check . || echo "::warning::Imports need sorting"
          fi

      - name: Lint Python files (flake8)
        continue-on-error: true
        run: |
          if ls *.py 2>/dev/null; then
            flake8 . --max-line-length=120 || echo "::warning::Linting issues found"
          fi

      - name: Check shell scripts
        continue-on-error: true
        run: |
          if which shellcheck >/dev/null; then
            find . -name "*.sh" -exec shellcheck {} \; 2>&1 || true
          fi

      - name: Check file permissions
        run: |
          echo "Checking script permissions..."
          find . -name "*.sh" -exec chmod +x {} \;

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Spell check with Codespell
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_list: "teh,htis"
          check_filenames: true
          skip: ".git,*.pyc,*.pdf,*.png,*.jpg,*.zip"
