# Multi-OS Compatibility System - Default Configuration
# 多平台兼容系统 - 默认配置文件

system:
  # 日志级别: debug, info, warning, error, critical
  log_level: info
  
  # 数据目录
  data_dir: /var/lib/multi-os
  
  # 临时目录
  temp_dir: /tmp/multi-os

platforms:
  # Windows 兼容层 (Wine) 配置
  windows:
    enabled: true
    prefix: ~/.multi-os/wine
    audio_driver: pulse,alsa,oss
    video_memory: 1024
    esync: true
    fsync: true
    
  # macOS 兼容层 (Darling) 配置
  macos:
    enabled: true
    prefix: ~/.multi-os/darling
    
  # Linux 原生支持
  linux:
    enabled: true

performance:
  # 事件同步 (提高多线程性能)
  esync: true
  
  # Futex 同步 (更新的同步机制)
  fsync: true
  
  # DXVK (DirectX 到 Vulkan 转换)
  dxvk: true

logging:
  # 日志文件路径
  file: ~/.multi-os/logs/multi-os.log
  
  # 日志文件最大大小
  max_size: 10M
  
  # 保留的日志文件数量
  backup_count: 5

graphics:
  # 图形驱动
  driver: auto
  
  # 启用硬件加速
  hardware_acceleration: true
  
  # DXVK 配置
  dxvk:
    async: true
    cache: true
    hud: 0

audio:
  # 音频驱动
  driver: pulse
  
  # 采样率
  sample_rate: 44100
  
  # 声道数
  channels: 2
