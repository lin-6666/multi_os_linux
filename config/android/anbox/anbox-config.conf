# Multi-OS Linux Anbox Configuration
# Android 运行时配置

# 显示配置
[display]
width=1080
height=1920
dpi=420

# 网络配置
[network]
mode=bridge

# GPU 配置
[gpu]
mode=auto

# 音频配置
[audio]
driver=alsa

# Android 配置
[android]
hwaddr.random=enable
武昌_imei=auto
武昌_dual_sim=auto

# 共享配置
[shared]
data=/home/$USER/.multi-os/android/data
sdcard=/home/$USER/.multi-os/android/sdcard
